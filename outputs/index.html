<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="data:," />
  <title>GL-3DPRT运动范围判定工具 V1.8 · 2026-07-16 · ©Ming Xia</title>
  <style>
    :root {
      color-scheme: light;
      --line: #e5e5e5;
      --muted: #717171;
      --ink: #383838;
      --paper: #ffffff;
      --page: #f4f4f4;
      --shadow: 0 1px 3px rgba(0,0,0,0.09), 0 1px 2px -1px rgba(0,0,0,0.09);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--page);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    main {
      width: 100%;
      min-height: 100vh;
      background: var(--paper);
    }

    .home-content {
      min-height: 100vh;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: clamp(64px, 8vw, 112px) clamp(72px, 13vw, 220px);
      background: #fff;
    }

    .eyebrow {
      margin-bottom: 20px;
      color: #767676;
      font-size: 13px;
      font-weight: 600;
    }

    h1 {
      max-width: 940px;
      margin: 0;
      font-size: clamp(34px, 4.1vw, 56px);
      font-weight: 760;
      line-height: 1.08;
      color: #383838;
    }

    p {
      max-width: 620px;
      margin: 24px 0 0;
      color: var(--muted);
      font-size: clamp(16px, 1.45vw, 20px);
      line-height: 1.55;
    }

    .device-actions {
      display: grid;
      grid-template-columns: minmax(280px, 520px);
      gap: 30px;
      margin-top: 52px;
    }

    a {
      min-height: 82px;
      display: grid;
      grid-template-columns: 38px minmax(0, 1fr);
      grid-template-rows: auto auto;
      align-items: center;
      justify-content: stretch;
      gap: 10px 28px;
      padding: 0;
      border: 0;
      background: transparent;
      box-shadow: none;
      color: var(--ink);
      text-decoration: none;
      transition: color 160ms ease;
    }

    strong {
      grid-column: 2;
      font-size: 26px;
      font-weight: 760;
      line-height: 1.05;
      color: inherit;
    }

    span {
      grid-column: 2;
      color: inherit;
      font-size: 12px;
      font-weight: 700;
      line-height: 1.4;
    }

    a::before {
      grid-row: 1 / span 2;
      width: 26px;
      height: 26px;
      display: grid;
      place-items: center;
      border: 1px solid #8b8b8b;
      color: #383838;
      font-size: 11px;
      font-weight: 700;
      content: "01";
      align-self: center;
    }

    a:nth-child(2)::before {
      content: "02";
    }

    a:hover {
      color: #000;
    }

    .meta {
      margin-top: 26px;
      color: var(--muted);
      font-size: 12px;
    }

    footer {
      position: absolute;
      left: auto;
      right: 72px;
      bottom: 28px;
      color: var(--muted);
      font-size: 12px;
      text-align: right;
    }

    @media (max-width: 760px) {
      .home-content {
        min-height: auto;
        padding: 32px 24px 46px;
      }

      .device-actions {
        grid-template-columns: 1fr;
        margin-top: 40px;
      }

      a {
        width: 100%;
      }

      footer {
        position: static;
        margin-top: 44px;
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="home-content">
      <div class="eyebrow">Motion Range Workspace</div>
      <h1>GL-3DPRT运动范围判定工具</h1>
      <p>选择设备型号，进入对应的打印范围判定工具。</p>

      <nav class="device-actions" aria-label="设备选择">
        <a href="GL-3DPRT-SP-M.html">
          <strong>SP-M</strong>
          <span>GL-3DPRT-SP-M</span>
        </a>
        <a href="GL-3DPRT-SP-S.html">
          <strong>SP-S</strong>
          <span>GL-3DPRT-SP-S</span>
        </a>
      </nav>

      <div class="meta">
        <span>V1.8 · 2026-07-16 · ©Ming Xia</span>
      </div>

      <footer>©Ming Xia</footer>
    </section>
  </main>
</body>
</html>
