<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GL-3DPRT运动范围判定工具 v1.14</title>
  <style>
    :root {
      color-scheme: dark;
      --black: #000;
      --white: #fff;
      --soft: #f0f0fa;
      --line: #3a3a3f;
      --muted: #a9a9b2;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--black);
      color: var(--white);
      font-family: "D-DIN", "Arial Narrow", Arial, Verdana, sans-serif;
      letter-spacing: 0.32px;
    }

    main {
      width: min(1220px, calc(100vw - 72px));
      min-height: calc(100vh - 72px);
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      border: 1px solid rgba(58, 58, 63, 0.42);
      border-radius: 28px;
      padding: clamp(42px, 7vw, 84px);
      background: #000;
    }

    .eyebrow {
      margin: 0 0 18px;
      color: var(--soft);
      font-size: 12px;
      font-weight: 700;
      line-height: 2;
      letter-spacing: 1.2px;
      text-transform: uppercase;
    }

    h1 {
      max-width: 980px;
      margin: 0;
      color: var(--soft);
      font-family: "D-DIN-Bold", "Arial Narrow", Arial, Verdana, sans-serif;
      font-size: clamp(48px, 7.2vw, 96px);
      font-weight: 700;
      line-height: 0.98;
      letter-spacing: 1.6px;
      text-transform: uppercase;
    }

    p {
      max-width: 870px;
      margin: 42px 0 0;
      color: var(--muted);
      font-size: clamp(18px, 2.2vw, 30px);
      font-weight: 400;
      line-height: 1.72;
      letter-spacing: 1px;
    }

    .device-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      margin-top: 70px;
    }

    a {
      min-width: 258px;
      min-height: 96px;
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 7px;
      border: 1px solid rgba(240, 240, 250, 0.48);
      border-radius: 999px;
      padding: 18px 34px;
      color: var(--white);
      background: rgba(255, 255, 255, 0.08);
      text-decoration: none;
      transition: background 160ms ease, color 160ms ease, border-color 160ms ease;
    }

    a:hover {
      border-color: var(--white);
      background: var(--white);
      color: var(--black);
    }

    strong {
      font-family: "D-DIN-Bold", "Arial Narrow", Arial, Verdana, sans-serif;
      font-size: 28px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: 1.4px;
      text-transform: uppercase;
    }

    span {
      font-size: 13px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 18px;
      margin-top: 28px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      letter-spacing: 0.7px;
      text-transform: uppercase;
    }

    footer {
      position: absolute;
      left: 0;
      right: 0;
      bottom: clamp(28px, 5vw, 56px);
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      letter-spacing: 0.6px;
      text-align: center;
    }

    @media (max-width: 760px) {
      body { place-items: stretch; }

      main {
        width: 100%;
        min-height: 100vh;
        border: 0;
        border-radius: 0;
        padding: 32px 24px;
      }

      p {
        margin-top: 30px;
      }

      .device-actions {
        margin-top: 44px;
        gap: 14px;
      }

      a {
        width: 100%;
        min-height: 84px;
      }

      footer {
        position: static;
        margin-top: 44px;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="eyebrow">Motion Range Workspace</div>
    <h1>GL-3DPRT运动范围判定工具</h1>
    <p>选择设备型号，进入对应的打印范围判定工具。设备模型按需加载，可导入 STL 参考模型、显示近似交线，也可隐藏中间的内接长方体。</p>

    <nav class="device-actions" aria-label="设备选择">
      <a href="GL-3DPRT-SP-M.html">
        <strong>SP-M</strong>
        <span>GL-3DPRT-SP-M</span>
      </a>
      <a href="GL-3DPRT-SP-S.html">
        <strong>SP-S</strong>
        <span>GL-3DPRT-SP-S</span>
      </a>
    </nav>

    <div class="meta">
      <span>Version v1.14</span>
      <span>Updated 2026-07-07</span>
      <span>SP-M / SP-S</span>
    </div>

    <footer>©杭州冠力智能科技</footer>
  </main>
</body>
</html>
