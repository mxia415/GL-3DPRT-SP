<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>蜘蛛式建筑3D打印机运动范围判定工具</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #2b2622;
      --panel: #383330;
      --panel-2: #312c28;
      --ink: #f7f5f0;
      --body: #c9c0ad;
      --muted: #aea69c;
      --line: #3f3a36;
      --shadow: 0 18px 46px rgba(0, 0, 0, 0.28);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        linear-gradient(90deg, rgba(247,245,240,0.035) 1px, transparent 1px),
        linear-gradient(0deg, rgba(247,245,240,0.035) 1px, transparent 1px),
        var(--bg);
      background-size: 38px 38px;
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    main {
      width: min(820px, calc(100vw - 32px));
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 34px;
      background: rgba(56, 51, 48, 0.92);
      box-shadow: var(--shadow);
    }

    header {
      display: grid;
      gap: 8px;
      margin-bottom: 24px;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 42px);
      line-height: 1.1;
      font-weight: 760;
    }

    p {
      margin: 0;
      color: var(--body);
      font-size: 15px;
      line-height: 1.6;
    }

    .device-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    a {
      min-height: 148px;
      display: grid;
      align-content: space-between;
      gap: 18px;
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 20px;
      color: var(--ink);
      background: var(--panel-2);
      text-decoration: none;
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    a:hover {
      transform: translateY(-2px);
      border-color: rgba(247, 245, 240, 0.32);
      background: rgba(247, 245, 240, 0.08);
    }

    strong {
      display: block;
      font-size: 24px;
      line-height: 1.15;
      font-weight: 780;
    }

    span {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    footer {
      margin-top: 22px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    @media (max-width: 680px) {
      main { padding: 24px; }
      .device-grid { grid-template-columns: 1fr; }
      a { min-height: 128px; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>蜘蛛式建筑3D打印机运动范围判定工具</h1>
      <p>选择设备型号，进入对应的3D可达空间和内接长方体判定工具。</p>
    </header>

    <section class="device-grid" aria-label="设备选择">
      <a href="GL-3DPRT-SP-M.html">
        <strong>SP-M</strong>
        <span>GL-3DPRT-SP-M</span>
      </a>
      <a href="GL-3DPRT-SP-S.html">
        <strong>SP-S</strong>
        <span>GL-3DPRT-SP-S</span>
      </a>
    </section>

    <footer>两个页面使用相同判定方法：XY 平面可达区域与 R-Z 垂直截面的交集。</footer>
  </main>
</body>
</html>
