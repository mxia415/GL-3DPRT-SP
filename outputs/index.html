<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="data:," />
  <title>GL-3DPRT运动范围判定工具 V1.2 · 2026-07-03 · ©Ming Xia</title>
  <script>document.documentElement.dataset.theme = localStorage.getItem("gl3dprt-theme") || "dark";</script>
  <style>
    :root {
      color-scheme: dark;
      --black: #000;
      --white: #fff;
      --soft: #f0f0fa;
      --line: #3a3a3f;
      --muted: #a9a9b2;
      --accent: #fff;
      --surface: #000;
      --surface-2: rgba(255, 255, 255, 0.08);
      --button-ink: #000;
    }

    html[data-theme="light"] {
      color-scheme: light;
      --black: #fbfbf9;
      --white: #211922;
      --soft: #211922;
      --line: #dadad3;
      --muted: #62625b;
      --accent: #e60023;
      --surface: #ffffff;
      --surface-2: #f6f6f3;
      --button-ink: #ffffff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--black);
      color: var(--white);
      font-family: "D-DIN", "Arial Narrow", Arial, Verdana, sans-serif;
      letter-spacing: 0.32px;
    }

    main {
      width: min(1220px, calc(100vw - 72px));
      min-height: calc(100vh - 72px);
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: clamp(42px, 7vw, 84px);
      background: var(--surface);
    }

    .theme-toggle {
      position: absolute;
      top: clamp(22px, 4vw, 42px);
      right: clamp(22px, 4vw, 42px);
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 3px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface-2);
    }

    .theme-toggle button {
      min-width: 54px;
      min-height: 30px;
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      font: inherit;
      font-size: 12px;
      font-weight: 700;
      line-height: 1;
      cursor: pointer;
    }

    .theme-toggle button.is-active {
      background: var(--accent);
      color: var(--button-ink);
    }

    .eyebrow {
      margin: 0 0 18px;
      color: var(--soft);
      font-size: 12px;
      font-weight: 700;
      line-height: 2;
      letter-spacing: 1.2px;
      text-transform: uppercase;
    }

    h1 {
      max-width: 980px;
      margin: 0;
      color: var(--soft);
      font-family: "D-DIN-Bold", "Arial Narrow", Arial, Verdana, sans-serif;
      font-size: clamp(48px, 7.2vw, 96px);
      font-weight: 700;
      line-height: 0.98;
      letter-spacing: 1.6px;
      text-transform: uppercase;
    }

    p {
      max-width: 870px;
      margin: 42px 0 0;
      color: var(--muted);
      font-size: clamp(18px, 2.2vw, 30px);
      font-weight: 400;
      line-height: 1.72;
      letter-spacing: 1px;
    }

    .device-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      margin-top: 70px;
    }

    a {
      min-width: 258px;
      min-height: 96px;
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 7px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 18px 34px;
      color: var(--white);
      background: var(--surface-2);
      text-decoration: none;
      transition: background 160ms ease, color 160ms ease, border-color 160ms ease;
    }

    a:hover {
      border-color: var(--white);
      background: var(--white);
      color: var(--black);
    }

    strong {
      font-family: "D-DIN-Bold", "Arial Narrow", Arial, Verdana, sans-serif;
      font-size: 28px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: 1.4px;
      text-transform: uppercase;
    }

    span {
      font-size: 13px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 18px;
      margin-top: 28px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      letter-spacing: 0.7px;
      text-transform: uppercase;
    }

    footer {
      position: absolute;
      left: 0;
      right: 0;
      bottom: clamp(28px, 5vw, 56px);
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      letter-spacing: 0.6px;
      text-align: center;
    }

    @media (max-width: 760px) {
      body { place-items: stretch; }

      main {
        width: 100%;
        min-height: 100vh;
        border: 0;
        border-radius: 0;
        padding: 32px 24px;
      }

      .theme-toggle {
        position: static;
        align-self: flex-start;
        margin-bottom: 34px;
      }

      p {
        margin-top: 30px;
      }

      .device-actions {
        margin-top: 44px;
        gap: 14px;
      }

      a {
        width: 100%;
        min-height: 84px;
      }

      footer {
        position: static;
        margin-top: 44px;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="theme-toggle" aria-label="主题切换">
      <button type="button" data-theme-choice="dark">深色</button>
      <button type="button" data-theme-choice="light">亮色</button>
    </div>
    <div class="eyebrow">Motion Range Workspace</div>
    <h1>GL-3DPRT运动范围判定工具</h1>
    <p>选择设备型号，进入对应的打印范围判定工具。</p>

    <nav class="device-actions" aria-label="设备选择">
      <a href="GL-3DPRT-SP-M.html">
        <strong>SP-M</strong>
        <span>GL-3DPRT-SP-M</span>
      </a>
      <a href="GL-3DPRT-SP-S.html">
        <strong>SP-S</strong>
        <span>GL-3DPRT-SP-S</span>
      </a>
    </nav>

    <div class="meta">
      <span>V1.2 · 2026-07-03 · ©Ming Xia</span>
      <span>SP-M / SP-S</span>
    </div>

    <footer>©Ming Xia</footer>
  </main>
  <script>
    const themeButtons = [...document.querySelectorAll("[data-theme-choice]")];

    function applyTheme(theme, persist = false) {
      const safeTheme = theme === "light" ? "light" : "dark";
      document.documentElement.dataset.theme = safeTheme;
      if (persist) localStorage.setItem("gl3dprt-theme", safeTheme);
      themeButtons.forEach((button) => {
        button.classList.toggle("is-active", button.dataset.themeChoice === safeTheme);
      });
    }

    themeButtons.forEach((button) => {
      button.addEventListener("click", () => applyTheme(button.dataset.themeChoice, true));
    });

    applyTheme(document.documentElement.dataset.theme);
  </script>
</body>
</html>
